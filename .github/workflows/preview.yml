name: Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.extract.outputs.preview_url }}
    permissions:
      contents: read
    # All env vars are read from .env.production (committed to repo).
    # RECLAIM_APP_SECRET is a Cloudflare Workers runtime secret (wrangler secret put).
    env:
      NEXT_PUBLIC_APP_URL: https://redacted.burnt.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.BURNT_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.BURNT_CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          packageManager: pnpm
          preCommands: pnpm build:worker
      - name: Extract version ID and preview URL
        id: extract
        run: |
          OUTPUT='${{ steps.preview.outputs.command-output }}'
          VERSION_ID=$(echo "$OUTPUT" | grep -oP 'Version ID:\s+\K[a-f0-9-]+' || echo 'unknown')
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev[^\s]*' | head -1 || echo '')
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
